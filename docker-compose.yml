services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: meetings-es
    environment:
      - discovery.type=single-node
      # Security is ENABLED: the meeting data indexed here is sensitive.
      # HTTP (not HTTPS) is fine because ES is not published to the host and
      # only reachable over the internal `knowledge-net` bridge network.
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      # For the pinned ES image this is re-applied on every start (via the
      # keystore bootstrap password), so `elastic` authenticates with ES_SECRET
      # on both fresh and existing data volumes (verified in testing).
      # scripts/lib/es-security.sh verifies this and resets the password as a
      # fallback for cases it can't cover (version drift, a password changed
      # out of band).
      - ELASTIC_PASSWORD=${ES_SECRET}
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
    # No `ports:` mapping — ES is intentionally NOT exposed on the host.
    # Use scripts/es-tunnel.sh for on-demand direct access.
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - knowledge-net
    healthcheck:
      # Credential-free: a 401 means ES is up and enforcing auth (which is what
      # we want). Keeping the password out of the healthcheck also avoids the
      # circular dependency during migration, when the password is set after
      # the container starts.
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9200 | grep -qE '200|401'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meetings-mcp
    ports:
      - "4005:4005"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ES_SECRET}
      - PORT=4005
      - MCP_PATH=/mcp
      - NODE_ENV=production
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:4005}
      # Microsoft Graph API
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - GRAPH_DATA_TIER=${GRAPH_DATA_TIER:-transcripts}
      # Session
      - SESSION_SECRET=${SESSION_SECRET}
      # Sync schedule (cron expression)
      - SYNC_CRON=${SYNC_CRON:-0 * * * *}
      - SYNC_LOOKBACK_DAYS=${SYNC_LOOKBACK_DAYS:-30}
    volumes:
      - token-cache:/app/.token-cache
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - knowledge-net
    restart: unless-stopped

volumes:
  es-data:
    driver: local
  token-cache:
    driver: local

networks:
  knowledge-net:
    driver: bridge
